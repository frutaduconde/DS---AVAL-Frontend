<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Comentários</h2>
    <a class="btn btn-primary" routerLink="/comentarios/cadastrar">Novo</a>
</div>

@if (mensagemErro) {
<div class="alert alert-danger">
    {{ mensagemErro }}
</div>
}

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Comentário</th>
                <th>Pessoa</th>
                <th class="text-center">Ações</th>
            </tr>
        </thead>
        <tbody>
            @for (com of comentarios; track com.id) {
            <tr>
                <td>{{ com.texto }}</td>
                <td>{{ nomePessoa(com.userId) }}</td>
                <td class="text-center">
                    <a class="btn btn-warning btn-sm me-2" [routerLink]="['/comentarios/alterar', com.id]">Alterar</a>
                    <button class="btn btn-danger btn-sm" (click)="excluir(com.id!)">Excluir</button>
                </td>
            </tr>
            } @empty {
            <tr>
                <td colspan="4" class="text-center">Nenhum comentário cadastrado.</td>
            </tr>
            }
        </tbody>
    </table>
</div>
