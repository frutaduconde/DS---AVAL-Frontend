<div class="d-flex justify-content-center align-items-center" style="height: 90vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h2 class="text-center mb-4">A-VAL</h2>

            @if (mensagemErro) {
            <div class="alert alert-danger">{{ mensagemErro }}</div>
            }

            <form [formGroup]="formLogin" (ngSubmit)="entrar()">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" formControlName="email">
                    @if (validarCampo('email', 'required')) {
                        <div class="text-danger small">O e-mail é obrigatório.</div>
                    }
                    @if (validarCampo('email', 'email')) {
                        <div class="text-danger small">Informe um e-mail válido.</div>
                    }
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" formControlName="senha">
                    @if (validarCampo('senha', 'required')) {
                        <div class="text-danger small">A senha é obrigatória.</div>
                    }
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success" [disabled]="formLogin.invalid">Entrar</button>
                </div>
            </form>

            <p class="text-center mt-3 mb-0">
                Ainda não tem uma conta? <a routerLink="/cadastro">Criar conta</a>
            </p>
        </div>
    </div>
</div>
