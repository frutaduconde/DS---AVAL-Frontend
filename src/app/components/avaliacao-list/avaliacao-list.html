<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Avaliações</h2>
    <a class="btn btn-primary" routerLink="/avaliacoes/cadastrar">Nova</a>
</div>

@if (mensagemErro) {
<div class="alert alert-danger">
    {{ mensagemErro }}
</div>
}

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Jogo</th>
                <th>Usuário</th>
                <th>Estado</th>
                <th class="text-center">Nota</th>
                <th class="text-center">Ações</th>
            </tr>
        </thead>
        <tbody>
            @for (av of avaliacoes; track av.id) {
            <tr>
                <td>{{ nomeJogo(av.jogoId) }}</td>
                <td>{{ nomePessoa(av.userId) }}</td>
                <td>{{ av.estado }}</td>
                <td class="text-center">
                    <span class="badge bg-success">{{ av.nota }}</span>
                </td>
                <td class="text-center">
                    @if (av.userId === meuId) {
                    <a class="btn btn-warning btn-sm me-2" [routerLink]="['/avaliacoes/alterar', av.id]">Alterar</a>
                    }
                    <button class="btn btn-danger btn-sm" (click)="excluir(av.id!)">Excluir</button>
                </td>
            </tr>
            } @empty {
            <tr>
                <td colspan="5" class="text-center">Nenhuma avaliação cadastrada.</td>
            </tr>
            }
        </tbody>
    </table>
</div>
